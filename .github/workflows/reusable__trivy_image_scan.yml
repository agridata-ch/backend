on:
  workflow_call:

jobs:
  trivy-image-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Restore Maven Cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Maven package
        run: mvn -B clean package -DskipTests -T 1C

      - name: Build Docker image
        run: docker build -t agridata-backend:trivy .

      - name: Restore Trivy DB Cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: cache-trivy-never-match-${{ github.run_id }}
          restore-keys: cache-trivy-

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: agridata-backend:trivy
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          cache: 'false'
        env:
          TRIVY_SKIP_DB_UPDATE: true
          TRIVY_SKIP_JAVA_DB_UPDATE: true
