agridata:
  base-url: https://localhost:4200
  email:
    enabled: true
    sender-address: support@agridata.local
  agreement:
    contract-bucket-name: contracts
  tvd-equid-owner-dropdown:
    enabled: true
quarkus:
  aws:
    devservices:
      localstack:
        # Fixed port to ensure S3 and SNS devservices always bind to the same LocalStack container.
        # Without a fixed port, each extension may start its own container on a random port, and
        # the SNS client ends up configured with a port that gets replaced by S3's container startup.
        port: 63000
  http:
    test-timeout: 60s
  console:
    color: true
  flyway:
    locations:
      - classpath:db/migration
      - classpath:db/testdata
  keycloak:
    devservices:
      realm-path: agate_realm.json
  log:
    level: WARN
    category:
      ch.agridata.common.filters:
        level: WARN
  oidc-client:
    agis-api:
      token-path: http://localhost:8051/agate/token
    acontrol-api:
      token-path: http://localhost:8051/agate/token
  rest-client:
    uid-register:
      url: http://localhost:8051/uid-register/findByUid
    agis-api:
      url: http://localhost:8051/agis
    bit-signature-api:
      url: http://localhost:8051/bit-signature
    tvd-animal-tracing-api:
      url: http://localhost:8051/tvd/animal-tracing
    tvd-zo-api:
      url: http://localhost:8051/tvd/zo
    acontrol-api:
      url: http://localhost:8051/acontrol
  s3:
    devservices:
      buckets:
        - contracts
    aws:
      credentials:
        type: static
        static-provider:
          access-key-id: local-key
          secret-access-key: secret
  ses:
    aws:
      credentials:
        type: static
        static-provider:
          access-key-id: local-key
          secret-access-key: secret
  sns:
    aws:
      credentials:
        type: static
        static-provider:
          access-key-id: local-key
          secret-access-key: secret
  test:
    enable-callbacks-for-integration-tests: true
  wiremock:
    devservices:
      enabled: true
      files-mapping: src/test/resources/wiremock
      port: 8051
      reload: true
