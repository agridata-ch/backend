agridata:
  tvd-equid-owner-dropdown:
    enabled: true
quarkus:
  http:
    test-timeout: 60s
  console:
    color: true
  cxf:
    client:
      uid:
        http-conduit-factory: URLConnectionHTTPConduitFactory
        client-endpoint-url: http://localhost:8051/uid-register/findByUid
  flyway:
    locations:
      - classpath:db/migration
      - classpath:db/testdata
  keycloak:
    devservices:
      # TODO: Remove when Quarkus defaults to Keycloak >= 26.5.3 (Quarkus 3.31.2 defaults to 26.5.0 which has auth issues)
      image-name: quay.io/keycloak/keycloak:26.5.3
      realm-path: agate_realm.json
  log:
    level: WARN
    category:
      ch.agridata.common.filters:
        level: WARN
  oidc-client:
    agis-api:
      token-path: http://localhost:8051/agate/token
  rest-client:
    agis-api:
      url: http://localhost:8051/agis
    tvd-animal-tracing-api:
      url: http://localhost:8051/tvd/animal-tracing/v1.0
  wiremock:
    devservices:
      enabled: true
      files-mapping: src/test/resources/wiremock
      port: 8051
      reload: true
