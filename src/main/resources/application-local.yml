agridata:
  email:
    enabled: true
    sender-address: support@agridata.local
  agreement:
    contract-bucket-name: contracts
    otp:
      validation:
        enabled: false
  tvd-equid-owner-dropdown:
    enabled: true
quarkus:
  aws:
    devservices:
      localstack:
        port: 4566
  hibernate-orm:
    log:
      sql: false
      format-sql: true
  console:
    color: true
  cxf:
    client:
      uid:
        http-conduit-factory: URLConnectionHTTPConduitFactory
        client-endpoint-url: http://localhost:8050/uid-register/findByUid
  datasource:
    devservices:
      db-name: agridata
      enabled: true
      password: secret
      port: 5432
      username: admin
  flyway:
    locations:
      - classpath:db/migration
  http:
    cors:
      origins:
        - http://localhost:4200
  keycloak:
    devservices:
      port: 6999
      realm-path: agate_realm.json
  log:
    console:
      json:
        enabled: false
    category:
      ch.agridata.common.filters:
        level: DEBUG
      io.quarkiverse.wiremock.devservice.WireMockServer:
        level: WARN
      'io.quarkus.oidc.client ':
        level: DEBUG
      io.quarkus.rest.client:
        level: DEBUG
      org.jboss.resteasy.reactive.client.logging:
        level: WARN
      org.jboss.resteasy.reactive.server.logging:
        level: WARN
      ch.agridata.common.filters.RestClientLoggingFilter:
        level: DEBUG
      ch.agridata.bit:
        level: DEBUG
    level: INFO
  oidc:
    application-type: service
    client-id: agridata-ui
    token:
      audience: agridata-backend
  oidc-client:
    agis-api:
      token-path: http://localhost:8050/agate/token
  rest-client:
    agis-api:
      url: http://localhost:8050/agis
    bit-signature-api:
      url: http://localhost:8050/bit-signature
    tvd-animal-tracing-api:
      url: http://localhost:8050/tvd/animal-tracing
    tvd-zo-api:
      url: http://localhost:8050/tvd/zo
    logging:
      body-limit: 10240
      scope: request-response
  s3:
    devservices:
      buckets:
        - contracts
    aws:
      credentials:
        type: static
        static-provider:
          access-key-id: local-key
          secret-access-key: secret
  ses:
    aws:
      credentials:
        type: static
        static-provider:
          access-key-id: local-key
          secret-access-key: secret
  sns:
    aws:
      credentials:
        type: static
        static-provider:
          access-key-id: local-key
          secret-access-key: secret
  swagger-ui:
    oauth-client-id: agridata-ui
    oauth-client-secret: secret
  wiremock:
    devservices:
      enabled: true
      files-mapping: src/test/resources/wiremock
      port: 8050
